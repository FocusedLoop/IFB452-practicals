<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            text-align: center;
            font-family: Arial, Helvetica, sans-serif;
        }

        div {
            width: 20%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
        }

        button {
            width: 100%;
            margin: 10px 0px 5px 0px;
        }
    </style>
</head>

<body>
    <div>
        <h1>This is my dApp!</h1>
        <p>Here you can set or get your name:</p>
        <label for="name">Input Your Name:</label> <br />
        <input type="text" id="name" />
        <button onclick="setName()">Set Name</button>
        <button onclick="getName()">Get Name</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>

    <script>
    const provider = new ethers.providers.Web3Provider(window.ethereum);

    const NameContractAddress = "0x2d5d398651b3E7A6907825D8Fb08F5e6EF7feb51";
    const NameContractABI = [
        {
            "inputs": [
                {
                    "internalType": "string",
                    "name": "_name",
                    "type": "string"
                }
            ],
            "name": "setName",
            "outputs": [],
            "stateMutability": "nonpayable",
            "type": "function"
        },
        {
            "inputs": [],
            "name": "getName",
            "outputs": [
                {
                    "internalType": "string",
                    "name": "",
                    "type": "string"
                }
            ],
            "stateMutability": "view",
            "type": "function"
        },
        {
            "inputs": [],
            "name": "storeName",
            "outputs": [
                {
                    "internalType": "string",
                    "name": "",
                    "type": "string"
                }
            ],
            "stateMutability": "view",
            "type": "function"
        }
    ];

    let NameContract;

    async function init() {
        await provider.send("eth_requestAccounts", []);
        const signer = provider.getSigner();

        const network = await provider.getNetwork();
        console.log("Network:", network);

        const code = await provider.getCode(NameContractAddress);
        console.log("Code at address:", code);

        NameContract = new ethers.Contract(
            NameContractAddress,
            NameContractABI,
            signer
        );
    }

    async function getName() {
        try {
            if (!NameContract) {
                await init();
            }

            const name = await NameContract.getName();
            console.log("getName:", name);
        } catch (err) {
            console.error("getName failed:", err);
        }
    }

    async function setName() {
        try {
            if (!NameContract) {
                await init();
            }

            const name = document.getElementById("name").value;
            const tx = await NameContract.setName(name);
            console.log("tx hash:", tx.hash);
            await tx.wait();
            console.log("setName mined");
        } catch (err) {
            console.error("setName failed:", err);
        }
    }

    init();
</script>
</body>

</html>
